name: Rebuild pkgdown site on gh-pages

on:
  push:
    branches: [devel]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rebuild-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: devel
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: pkgdown, local::.
          needs: website

      - name: Merge devel into gh-pages and rebuild
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          git merge --no-edit origin/devel
          Rscript -e 'pkgdown::build_site()'
          git add -A
          git diff --cached --quiet || git commit -m "Rebuild pkgdown site [skip ci]"
          git push origin gh-pages
